      /* ==========================================
         APP COMPONENT
         ========================================== */
      function App() {
        const [scrolled, setScrolled] = React.useState(false);
        const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

        // Monitor Scroll for Navbar styling
        React.useEffect(() => {
          const handleScroll = () => {
            if (window.scrollY > 50) {
              setScrolled(true);
            } else {
              setScrolled(false);
            }
          };
          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
          <div>
            {/* Header / Navigation */}
            <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
              <div className="nav-container container">
                <div className="logo" onClick={() => window.scrollTo(0, 0)}>
                  <span>APEX</span>DYNAMICS
                </div>
                <ul className={`nav-links ${mobileMenuOpen ? 'active' : ''}`}>
                  <li><a href="#hero" onClick={() => setMobileMenuOpen(false)}>Home</a></li>
                  <li><a href="#features" onClick={() => setMobileMenuOpen(false)}>Benefits</a></li>
                  <li><a href="#classes" onClick={() => setMobileMenuOpen(false)}>Classes</a></li>
                  <li><a href="#bmi" onClick={() => setMobileMenuOpen(false)}>BMI Calc</a></li>
                  <li><a href="#pricing" onClick={() => setMobileMenuOpen(false)}>Membership</a></li>
                  <li><a href="#trainers" onClick={() => setMobileMenuOpen(false)}>Coaches</a></li>

            {/* Core Features */}

            {/* Pricing Custom Builder */}

      /* ==========================================
         HERO COMPONENT
         ========================================== */
      function Hero() {
        const heroRef = React.useRef(null);

        React.useEffect(() => {
          const el = heroRef.current;
          
          // Set initial positions
          gsap.set(el.querySelectorAll('.animate-hero'), { y: 60, opacity: 0 });

          // Timeline for hero entrance
          const tl = gsap.timeline({ defaults: { ease: 'power4.out', duration: 1.2 } });
          tl.to(el.querySelectorAll('.animate-hero'), {
            y: 0,
            opacity: 1,
            stagger: 0.15,
            delay: 0.2
          });
        }, []);

        return (
          <section id="hero" className="hero" ref={heroRef} style={{ backgroundImage: "url('hero_bg.jpg')" }}>
            <div className="container">
              <div className="hero-content">
                <span className="hero-subtitle animate-hero">Forge Your Best Self</span>
                <h1 className="hero-title animate-hero">
                  PULSE. STEEL.<br />
                  <span className="gradient-text">APEX POWER.</span>
                </h1>
                <p className="hero-description animate-hero">
                  An elite athletic space designed for high-performance training, state-of-the-art conditioning, and raw results. Unleash the beast within.
                </p>
                <div className="hero-actions animate-hero">
                  <a href="#pricing" className="glow-btn">Start Training</a>
                  <a href="#classes" className="sec-btn">Explore Classes</a>
                </div>
              </div>
            </div>
          </section>
        );
      }

                <h2 className="section-title">THE APEX ADVANTAGE</h2>

          { id: 2, title: "Metabolic HIIT Pulse", tag: "cardio", trainer: "Aria Vane", time: "Tue, Thu | 8:30 AM", img: "https://images.unsplash.com/photo-1518310383802-640c2de311b2?auto=format&fit=crop&w=600&q=80" },
          { id: 3, title: "Calisthenics Mastery", tag: "strength", trainer: "Marcus Steel", time: "Mon, Fri | 5:30 PM", img: "https://images.unsplash.com/photo-1598971639058-fab3c3109a00?auto=format&fit=crop&w=600&q=80" },

      /* ==========================================
         BMI CALCULATOR COMPONENT
         ========================================== */
      function BMICalculator() {
        const [height, setHeight] = React.useState(175);
        const [weight, setWeight] = React.useState(70);

        // Compute BMI
        const heightM = height / 100;
        const bmi = (weight / (heightM * heightM)).toFixed(1);
        const bmiNum = parseFloat(bmi);

        // Determine health category metrics
        let status = "Healthy Weight";
        let color = "var(--secondary)"; // cyan
        let message = "Excellent! You are in the optimal health bracket. Keep training hard.";
        let percentage = 0.5; // for the gauge circle offset

        if (bmiNum < 18.5) {
          status = "Underweight";
          color = "#00B4DB"; // cool blue
          message = "Time for a strategic bulk. Increase protein synthesis and compound lifts.";
          percentage = (bmiNum - 10) / (40 - 10);
        } else if (bmiNum >= 18.5 && bmiNum <= 24.9) {
          status = "Optimal Fit";
          color = "#00F2FE"; // neon cyan
          message = "Peak physical condition. Maintain caloric equilibrium and load progression.";
          percentage = (bmiNum - 10) / (40 - 10);
        } else if (bmiNum >= 25 && bmiNum <= 29.9) {
          status = "Overweight";
          color = "var(--accent)"; // gold
          message = "Incorporate calorie deficit. Enhance cardio drills and High-Intensity conditioning.";
          percentage = (bmiNum - 10) / (40 - 10);
        } else {
          status = "Obese Level";
          color = "var(--primary)"; // neon pink
          message = "Prioritize endurance and dietary shifts. Apex trainers will guide your journey.";
          percentage = (bmiNum - 10) / (40 - 10);
        }

        // Clamping percentage for gauge
        percentage = Math.max(0, Math.min(1, percentage));

        // Circular gauge config
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        const strokeDashoffset = circumference - (percentage * circumference);

        return (
          <section id="bmi" className="section">
            <div className="container">
              <div className="section-header">
                <span className="section-tag">Performance Metric</span>
                <h2 className="section-title">INTELLIGENT BMI ANALYZER</h2>
                <p style={{ color: 'var(--text-secondary)' }}>Find your current BMI score and matching conditioning feedback instantly.</p>
              </div>

              <div className="glass-panel bmi-wrapper">
                {/* Sliders Form */}
                <div className="bmi-form">
                  <div className="slider-group">
                    <div className="slider-header">
                      <span>Height</span>
                      <span>{height} cm</span>
                    </div>
                    <input 
                      type="range" 
                      min="120" 
                      max="220" 
                      value={height}
                      onChange={(e) => setHeight(parseInt(e.target.value))}
                      className="bmi-slider primary-slider" 
                    />
                  </div>

                  <div className="slider-group">
                    <div className="slider-header">
                      <span>Weight</span>
                      <span>{weight} kg</span>
                    </div>
                    <input 
                      type="range" 
                      min="30" 
                      max="150" 
                      value={weight}
                      onChange={(e) => setWeight(parseInt(e.target.value))}
                      className="bmi-slider" 
                    />
                  </div>
                </div>

                {/* Real-time Circular Gauge */}
                <div className="bmi-visualizer">
                  <div className="gauge-container">
                    <svg width="220" height="220" style={{ transform: 'rotate(-90deg)' }}>
                      {/* Background Ring */}
                      <circle 
                        cx="110" 
                        cy="110" 
                        r={radius} 
                        fill="transparent" 
                        stroke="rgba(255, 255, 255, 0.03)" 
                        strokeWidth="12" 
                      />
                      {/* Active Ring with dynamic offset and gradient color */}
                      <circle 
                        cx="110" 
                        cy="110" 
                        r={radius} 
                        fill="transparent" 
                        stroke={color} 
                        strokeWidth="12" 
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        style={{ transition: 'stroke-dashoffset 0.4s ease-out, stroke 0.4s ease' }}
                      />
                    </svg>
                    <div className="gauge-value" style={{ position: 'absolute' }}>
                      <span className="gauge-number" style={{ color: color }}>{bmi}</span>
                      <span className="gauge-lbl">BMI SCORE</span>
                    </div>
                  </div>

                  <div className="bmi-status-card" style={{ borderTop: `4px solid ${color}` }}>
                    <h4 style={{ color: color }}>{status}</h4>
                    <p>{message}</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      /* ==========================================
         MEMBERSHIP CUSTOM PRICE BUILDER
         ========================================== */
      function MembershipPricing() {
        const [duration, setDuration] = React.useState(6); // default 6 months
        const [addons, setAddons] = React.useState({
          trainer: true,
          spa: false,
          diet: false,
          locker: false
        });

        const durationDetails = {
          1: { name: "Monthly Pass", base: 49 },
          6: { name: "Semi-Annual Elite", base: 39 },
          12: { name: "Apex Annual Pass", base: 29 }
        };

        const addonPrices = {
          trainer: 40,
          spa: 15,
          diet: 25,
          locker: 5
        };

        const toggleAddon = (key) => {
          setAddons(prev => ({ ...prev, [key]: !prev[key] }));
        };

        // Compute Total Pricing
        const monthlyBase = durationDetails[duration].base;
        const monthlyAddons = Object.keys(addons).reduce((sum, key) => {
          return sum + (addons[key] ? addonPrices[key] : 0);
        }, 0);

        const totalMonthlyPrice = monthlyBase + monthlyAddons;
        const termTotal = totalMonthlyPrice * duration;

        return (
          <section id="pricing" className="section" style={{ background: '#0a0d14' }}>
            <div className="container">
              <div className="section-header">
                <span className="section-tag">Interactive Pricing</span>
                <h2 className="section-title">BUILD YOUR ACCESS LEVEL</h2>
                <p style={{ color: 'var(--text-secondary)' }}>Toggle duration options and custom add-ons to build your perfect membership.</p>
              </div>

              <div className="pricing-builder">
                {/* Builder Controls */}
                <div className="builder-controls">
                  {/* Duration Selector */}
                  <div className="duration-selector">
                    {[1, 6, 12].map(months => (
                      <div 
                        key={months}
                        className={`duration-opt ${duration === months ? 'active' : ''}`}
                        onClick={() => setDuration(months)}
                      >
                        {months} {months === 1 ? 'Month' : 'Months'}
                      </div>
                    ))}
                  </div>

                  {/* Addons Checklist */}
                  <div className="addons-list">
                    <div 
                      className={`addon-item ${addons.trainer ? 'selected' : ''}`}
                      onClick={() => toggleAddon('trainer')}
                    >
                      <div style={{ display: 'flex', alignItems: 'center' }}>
                        <div className="addon-checkbox">
                          {addons.trainer && <CheckIcon size={14} />}
                        </div>
                        <div className="addon-info">
                          <span className="addon-title">Personal Coach Guidance</span>
                          <span className="addon-desc">Weekly one-on-one sessions and biometric scans.</span>
                        </div>
                      </div>
                      <span className="addon-price">+${addonPrices.trainer}/mo</span>
                    </div>

                    <div 
                      className={`addon-item ${addons.spa ? 'selected' : ''}`}
                      onClick={() => toggleAddon('spa')}
                    >
                      <div style={{ display: 'flex', alignItems: 'center' }}>
                        <div className="addon-checkbox">
                          {addons.spa && <CheckIcon size={14} />}
                        </div>
                        <div className="addon-info">

      /* ==========================================
         CONTACT COMPONENT
         ========================================== */
      function Contact() {
        const [formData, setFormData] = React.useState({ name: '', email: '', phone: '', goal: 'muscle' });
        const [submitted, setSubmitted] = React.useState(false);
        const [error, setError] = React.useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!formData.name.trim() || !formData.email.trim()) {
            setError('Please fill in required fields (Name and Email).');
            return;
          }
          
          // Basic email regex
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(formData.email)) {
            setError('Please enter a valid email address.');
            return;
          }

          setError('');
          setSubmitted(true);
        };

        return (
          <section id="contact" className="section">
            <div className="container">
              <div className="contact-wrapper">
                {/* Details */}
                <div className="contact-info">
                  <div>
                    <span className="section-tag" style={{ display: 'inline-block', marginBottom: '1rem' }}>Get In Touch</span>
                    <h2 className="section-title" style={{ fontSize: '2.5rem', marginBottom: '1rem' }}>READY TO BEGIN YOUR ASCENT?</h2>
                    <p style={{ color: 'var(--text-secondary)' }}>Leave your details and a transformation strategist will reach out to build your roadmap within 24 hours.</p>
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
                    <div className="contact-method">
                      <div className="contact-method-icon"><MapPinIcon /></div>
                      <div>
                        <h4>Headquarters</h4>
                        <p>742 Cybernetic Boulevard, Suite 100, Sector 4</p>
                      </div>
                    </div>
                    <div className="contact-method">
                      <div className="contact-method-icon"><PhoneIcon /></div>
                      <div>
                        <h4>Direct Hotline</h4>
                        <p>+1 (800) 555-APEX / (555) 0199</p>
                      </div>
                    </div>
                    <div className="contact-method">
                      <div className="contact-method-icon"><MailIcon /></div>
                      <div>
                        <h4>Digital Support</h4>
                        <p>recruitment@apexdynamics.fit</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Form / Success Glass Panel */}
                <div className="glass-panel" style={{ minHeight: '400px' }}>
                  {submitted ? (
                    <div className="submit-success">
                      <div className="success-icon">
                        <CheckIcon size={40} />
                      </div>
                      <h3 className="section-title" style={{ fontSize: '2rem', marginBottom: '1rem' }}>Roadmap Reserved!</h3>
                      <p style={{ color: 'var(--text-secondary)', maxWidth: '400px', marginBottom: '2rem' }}>
                        Thank you, <strong>{formData.name}</strong>. An Apex specialist has locked in your details. Watch your inbox at <strong>{formData.email}</strong>.
                      </p>
                      <button className="sec-btn" onClick={() => { setSubmitted(false); setFormData({ name: '', email: '', phone: '', goal: 'muscle' }); }}>
                        Submit New Inquiry
                      </button>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit}>
                      <h3 style={{ fontFamily: 'var(--font-heading)', fontSize: '1.8rem', textTransform: 'uppercase', marginBottom: '2.5rem' }}>Transformation Portal</h3>
                      
                      {error && <div style={{ color: 'var(--primary)', marginBottom: '1.5rem', fontWeight: 600, fontSize: '0.9rem' }}>{error}</div>}

                      <div className="form-group">
                        <input 
                          type="text" 
                          id="name" 
                          placeholder=" " 
                          className="form-input" 
                          value={formData.name}
                          onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}
                        />
                        <label htmlFor="name" className="form-label">Full Name *</label>
                      </div>

                      <div className="form-group">
                        <input 
                          type="email" 
                          id="email" 
                          placeholder=" " 
                          className="form-input"
                          value={formData.email}
                          onChange={(e) => setFormData(prev => ({ ...prev, email: e.target.value }))}
                        />
                        <label htmlFor="email" className="form-label">Email Address *</label>
                      </div>

                      <div className="form-group">
                        <input 
                          type="tel" 
                          id="phone" 
                          placeholder=" " 
                          className="form-input"
                          value={formData.phone}
                          onChange={(e) => setFormData(prev => ({ ...prev, phone: e.target.value }))}
                        />
                        <label htmlFor="phone" className="form-label">Phone Number</label>
                      </div>

                      <div className="form-group" style={{ display: 'flex', flexDirection: 'column', gap: '0.8rem' }}>
                        <label style={{ fontSize: '0.8rem', color: 'var(--primary)', fontWeight: 600, textTransform: 'uppercase' }}>Primary Fitness Goal</label>
                        <select 
                          className="form-input"
                          style={{ background: 'var(--bg-base)', border: '1px solid var(--border-color)', borderRadius: '4px', padding: '0.8rem' }}
                          value={formData.goal}
                          onChange={(e) => setFormData(prev => ({ ...prev, goal: e.target.value }))}
                        >
                          <option value="muscle" style={{ background: 'var(--bg-base)' }}>Hypertrophy & Strength</option>
                          <option value="weight" style={{ background: 'var(--bg-base)' }}>Fat Loss & Shredding</option>
                          <option value="mobility" style={{ background: 'var(--bg-base)' }}>Yoga, Flexibility & Core</option>
                          <option value="combat" style={{ background: 'var(--bg-base)' }}>Boxing / MMA Conditioning</option>
                        </select>
                      </div>

                      <button type="submit" className="glow-btn" style={{ width: '100%', marginTop: '1rem' }}>
                        Request Free Pass
                      </button>
                    </form>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      }
